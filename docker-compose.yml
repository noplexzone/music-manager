services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: music-manager:0.1.0
    container_name: music-manager
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/music_manager.db"
    volumes:
      - ./data:/app/data
      - ${LIBRARY_ROOT:-/music}:/music:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
