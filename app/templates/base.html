<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Music Manager{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="layout">
  <header>
    <span class="logo">Music<span>Manager</span></span>
    <nav>
      <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
      <a href="/search" {% if request.url.path.startswith("/search") %}class="active"{% endif %}>Search</a>
      <a href="/jobs/ui/list" {% if request.url.path.startswith("/jobs") %}class="active"{% endif %}>Jobs</a>
      <a href="/imports/ui/review" {% if request.url.path.startswith("/imports") %}class="active"{% endif %}>Imports</a>
      <a href="/api/docs" target="_blank">API</a>
    </nav>
  </header>

  <main>
    {% if flash_message %}
    <div class="alert {{ flash_type | default('info') }}">{{ flash_message }}</div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer>
    Music Manager v0.1.1 &mdash; private, self-hosted
  </footer>
</div>
<script>
document.addEventListener("submit", async (event) => {
  const form = event.target;
  if (!(form instanceof HTMLFormElement) || form.method.toLowerCase() !== "post") return;
  event.preventDefault();
  const csrf = document.cookie.split("; ").find((part) => part.startsWith("csrf="))?.split("=")[1];
  const headers = csrf ? {"X-CSRF-Token": decodeURIComponent(csrf)} : {};
  const credentialsForm = form.action.endsWith("/api/auth/setup") || form.action.endsWith("/api/auth/login");
  let body;
  if (credentialsForm) {
    headers["Content-Type"] = "application/json";
    body = JSON.stringify(Object.fromEntries(new FormData(form)));
  } else {
    body = new FormData(form);
  }
  const response = await fetch(form.action, {method: "POST", headers, body});
  if (!response.ok) {
    const payload = await response.json().catch(() => ({}));
    window.alert(payload.detail || "Request failed");
    return;
  }
  window.location.assign(credentialsForm ? "/" : response.url);
});
</script>
</body>
</html>
